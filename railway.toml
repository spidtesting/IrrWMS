# Default Railway config for the IrrWMS **web** service (Next.js).
# Create two more services from this repo for socket + worker (see docs/deployment.md).

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
dockerTarget = "runner"

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Required env (set in Railway dashboard — shared across services where noted):
# DATABASE_URL, DIRECT_URL — Supabase session URL (port 5432)
# NEXTAUTH_SECRET, NEXTAUTH_URL, NEXT_PUBLIC_APP_URL
# UPSTASH_REDIS_REST_URL, UPSTASH_REDIS_REST_TOKEN, REDIS_URL
# NEXT_PUBLIC_SOCKET_URL — public URL of the socket service
# WORKER_ENABLED=false (web only)
