# Railway config for the IrrWMS **worker** service (cron jobs).
# In Railway: New Service → same repo → Settings → Config file: railway.worker.toml

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
dockerTarget = "worker"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Env: DATABASE_URL, DIRECT_URL, REDIS_URL, UPSTASH_*, CRON_SECRET, WORKER_ENABLED=true
