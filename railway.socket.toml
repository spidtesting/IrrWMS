# Railway config for the IrrWMS **socket** service.
# In Railway: New Service → same repo → Settings → Config file: railway.socket.toml

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
dockerTarget = "socket"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Env: DATABASE_URL, DIRECT_URL, REDIS_URL, UPSTASH_*, NEXTAUTH_SECRET, SOCKET_PORT=3001
