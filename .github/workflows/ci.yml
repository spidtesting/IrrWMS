name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  SKIP_ENV_VALIDATION: "true"
  DATABASE_URL: postgresql://irrwms:irrwms_secret@localhost:5432/irrwms?schema=public
  DIRECT_URL: postgresql://irrwms:irrwms_secret@localhost:5432/irrwms?schema=public
  NEXTAUTH_SECRET: ci-test-secret-minimum-32-characters-long
  NEXTAUTH_URL: http://localhost:3000
  REDIS_URL: redis://localhost:6379
  RESEND_API_KEY: re_ci_test_key
  RESEND_FROM_EMAIL: noreply@irrwms.local
  CLOUDINARY_CLOUD_NAME: ci-cloud
  CLOUDINARY_API_KEY: ci-key
  CLOUDINARY_API_SECRET: ci-secret

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: irrwms
          POSTGRES_PASSWORD: irrwms_secret
          POSTGRES_DB: irrwms
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U irrwms -d irrwms"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run migrations
        run: npx prisma migrate deploy

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

  build:
    runs-on: ubuntu-latest
    needs: lint-typecheck-test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: lint-typecheck-test
    if: github.event_name == 'pull_request'

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: irrwms
          POSTGRES_PASSWORD: irrwms_secret
          POSTGRES_DB: irrwms
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U irrwms -d irrwms"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Generate Prisma client & migrate
        run: |
          npx prisma generate
          npx prisma migrate deploy
          npm run db:seed

      - name: E2E tests
        run: npm run test:e2e -- --project=chromium

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
