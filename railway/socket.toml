# IrrWMS socket service — set "Railway Config File" to /railway/socket.toml
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.socket"
watchPatterns = ["server/**", "lib/**", "prisma/**"]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
