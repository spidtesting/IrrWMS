services:
  postgres:
    restart: always
    ports: []
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  redis:
    restart: always
    ports: []
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  app:
    restart: always
    ports: []
    environment:
      NODE_ENV: production
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL}
      RESEND_API_KEY: ${RESEND_API_KEY}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      UPSTASH_REDIS_REST_URL: ${UPSTASH_REDIS_REST_URL}
      UPSTASH_REDIS_REST_TOKEN: ${UPSTASH_REDIS_REST_TOKEN}
      LOG_LEVEL: ${LOG_LEVEL:-warn}
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
      replicas: 1

  worker:
    restart: always
    environment:
      NODE_ENV: production
      WORKER_ENABLED: "true"
      LOG_LEVEL: ${LOG_LEVEL:-warn}
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  socket-server:
    restart: always
    ports: []
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-warn}
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  nginx:
    restart: always
    ports:
      - "${NGINX_PORT:-443}:443"
      - "${NGINX_PORT_HTTP:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
